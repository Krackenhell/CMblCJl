services:
  local-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --model
      - /models/qwen2.5-7b-instruct-q4_k_m.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "6144"
      - --jinja
      - --no-webui
    volumes:
      - ./models:/models:ro
  local-llm-fast:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --model
      - /models/qwen2.5-3b-instruct-q4_k_m.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --ctx-size
      - "3072"
      - --jinja
      - --no-webui
    volumes:
      - ./models:/models:ro
  meaning_trainer:
    build: .
    ports:
      - "8501:8501"
    environment:
      LOCAL_LLM_URL: http://local-llm:8080
      LOCAL_LLM_FAST_URL: http://local-llm-fast:8081
      LOCAL_LLM_MODEL: Qwen2.5-7B-Instruct-Q4_K_M
      LOCAL_LLM_FAST_MODEL: Qwen2.5-3B-Instruct-Q4_K_M
      MEANING_DB_PATH: /data/meaning_trainer.db
    volumes:
      - meaning_trainer_data:/data
    depends_on:
      - local-llm
      - local-llm-fast

volumes:
  meaning_trainer_data:
